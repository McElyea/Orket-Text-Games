mode: truth_or_refuse_textmystery
source_assets:
  - content/scenes.yaml
  - content/crimes.yaml
  - content/npcs.yaml
  - content/secrets.yaml
  - content/refusal_styles.yaml
  - content/prompts/archetypes.yaml
