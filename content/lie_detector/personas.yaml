version: 1

# Persona content pools for The Lie Detector.
# generate_personas() picks deterministically from these pools per seed.

first_names:
  - Dana
  - Rafe
  - Juno
  - Cole
  - Miri
  - Tomas
  - Leigh
  - Sable
  - Ori
  - Petra
  - Kell
  - Zara

last_names:
